<form id="remote-files-form">
    <table class="news-table" role="table" aria-label="File list">
        <thead>
            <tr>
                <th scope="col" style="width: 30px;"></th>
                <th scope="col">Name</th>
                <th scope="col">Kind</th>
                <th scope="col">Size</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td></td>
                <td data-label="Name">
                    <a href="#" hx-post="/change_directory" hx-vals='{"directory": ".."}' hx-target="#remote-list"
                        hx-swap="innerHTML" class="dir-link">
                        ⬆ ..
                    </a>
                </td>
                <td data-label="Kind">dir</td>
                <td data-label="Size">-</td>
            </tr>
            {% for f in files %}
            <tr>
                <td>
                    <input type="checkbox" name="files" value="{{ f.name }}" />
                </td>
                <td data-label="Name">
                    {% if f.is_dir() %}
                    <a href="#" hx-post="/change_directory" hx-vals='{"directory": "{{ f.name }}"}'
                        hx-target="#remote-list" hx-swap="innerHTML" class="dir-link">
                        📁 {{ f.name }}
                    </a>
                    {% else %} 📄 {{ f.name }} {% endif %}
                </td>
                <td data-label="Kind">{% if f.is_dir() %}dir{% else %}file{% endif %}</td>
                <td data-label="Size">{{ f.size_display() }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</form>
